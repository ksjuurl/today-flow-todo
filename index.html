<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List...</title>
    <!-- Electron 보안 및 외부 리소스 허용을 위한 CSP 설정 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: https://cdn-icons-png.flaticon.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.google-analytics.com;">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2F2A22">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/906/906334.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-stone-50 h-screen overflow-hidden">

    <!-- 메인 앱 컨테이너 -->
    <div class="bg-white w-full h-full flex flex-col">
        
        <!-- 상단 헤더 영역 -->
        <div class="bg-[#2F2A22] p-4 text-white text-center shadow-lg transition-all">  <!-- 타이틀 배경색-->
            <h1 id="headerTitle" contenteditable="true" spellcheck="false" onblur="saveTasks()" class="text-[#E6D7BD] text-xl font-extrabold mb-0.5 tracking-tight outline-none focus:bg-slate-800 rounded px-2 transition-all">순하게 호흡</h1>
            <p id="headerSubtitle" contenteditable="true" spellcheck="false" onblur="saveTasks()" class="text-[#BEA896] text-xs font-medium leading-tight outline-none focus:bg-slate-800 rounded px-2 transition-all">작은것 부터 천천히. 큰것은 작은것 부터 시작된다.</p>
        </div>

        <!-- 입력 영역 -->
        <div class="p-3 bg-slate-50 border-b border-slate-200 flex flex-col gap-2">
            <div class="flex gap-2">
                <button onclick="setQuickDate('today')" class="flex-1 py-1.5 text-[11px] font-bold rounded-lg bg-white border border-slate-200 text-slate-600 hover:bg-indigo-50 hover:border-indigo-200 hover:text-indigo-600 transition-all shadow-sm">오늘</button>
                <button onclick="setQuickDate('tomorrow')" class="flex-1 py-1.5 text-[11px] font-bold rounded-lg bg-white border border-slate-200 text-slate-600 hover:bg-indigo-50 hover:border-indigo-200 hover:text-indigo-600 transition-all shadow-sm">내일</button>
            </div>
            <div class="flex flex-col sm:flex-row gap-2 sm:gap-3">
                <!-- 날짜 선택 입력 추가 -->
                <input type="date" id="taskDate" class="bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs font-medium text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 shadow-sm cursor-pointer w-full sm:w-auto sm:min-w-[130px]">
                
                <input type="text" id="taskInput" spellcheck="false" autocomplete="off"
                    class="flex-1 bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all placeholder:text-slate-400"
                    placeholder="새로운 할 일을 입력하세요...">
            </div>
            <button onclick="addTask()" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white w-full h-10 rounded-xl shadow-md shadow-indigo-200 transition-all active:scale-95 flex items-center justify-center gap-2 font-bold text-sm">
                <i class="fa-solid fa-plus"></i> 할 일 추가하기
            </button>
        </div>

        <!-- 할 일 목록 영역 -->
        <div class="p-3 flex-1 overflow-y-auto no-scrollbar">
            <ul id="taskList" class="space-y-2">
                <!-- 자바스크립트를 통해 리스트가 추가됩니다 -->
            </ul>
        </div>
        
        <!-- 하단 상태 영역 -->
        <div class="p-3 bg-slate-50 border-t border-slate-200 text-sm text-slate-500 flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <span id="taskCount" class="font-medium px-3 py-1 bg-slate-200 rounded-full text-slate-600 text-[11px]">남은 일: 0개</span>
                <button onclick="clearCompleted()" class="text-slate-400 hover:text-rose-500 transition-colors flex items-center gap-1.5">
                    <i class="fa-solid fa-broom"></i>
                    완료된 항목 지우기
                </button>
            </div>
            <div class="flex justify-between items-center border-t border-slate-200 pt-3">
                <div class="flex gap-2">
                    <button onclick="exportData()" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-50 px-2.5 py-1.5 rounded-lg transition-all text-slate-600 shadow-sm flex items-center gap-1.5 font-medium">
                        <i class="fa-solid fa-file-export text-indigo-500"></i>내보내기
                    </button>
                    <button onclick="importData()" class="text-[10px] bg-white border border-slate-200 hover:bg-slate-50 px-2.5 py-1.5 rounded-lg transition-all text-slate-600 shadow-sm flex items-center gap-1.5 font-medium">
                        <i class="fa-solid fa-file-import text-rose-500"></i>불러오기
                    </button>
                </div>
                <span class="text-xs text-stone-400 self-center"><i class="fa-solid fa-check mr-1"></i>데이터가 PC에 자동 저장됩니다.</span>
            </div>
        </div>
    </div>

    <!-- [추가] 메모 작성용 모달 (팝업창) -->
    <!-- 평소엔 숨겨져 있다가(hidden) 호출되면 나타납니다 -->
    <div id="memoModal" class="hidden fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col border border-stone-200">
            <div class="p-5 border-b border-stone-100 flex justify-between items-center bg-white">
                <h3 class="text-lg font-bold text-stone-800"><i class="fa-solid fa-pen-nib mr-2 text-indigo-600"></i>메모 남기기</h3>
                <button onclick="closeMemoModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-stone-100 text-stone-400 hover:text-stone-600 transition-all">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <textarea id="modalMemoInput" spellcheck="false" class="w-full h-64 p-4 bg-stone-50 border border-stone-100 rounded-xl resize-none focus:outline-none focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 text-sm leading-relaxed text-stone-700 placeholder:text-stone-400" placeholder="여기에 소중한 생각을 자유롭게 남겨보세요..."></textarea>
            </div>
            <div class="px-6 pb-6 flex justify-end gap-3">
                <button id="btnDeleteMemo" onclick="deleteCurrentMemo()" class="hidden text-rose-500 hover:bg-rose-50 px-4 py-2.5 rounded-xl text-sm font-medium transition-colors mr-auto border border-transparent hover:border-rose-100"><i class="fa-solid fa-trash-can mr-1.5"></i>삭제</button>
                <button onclick="saveCurrentMemo()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-600/20 transition-all hover:-translate-y-0.5 active:translate-y-0">저장하기</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (v9+) 추가 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        // 사용자가 제공한 Firebase 설정값 적용
        const firebaseConfig = {
            apiKey: "AIzaSyC6Synm7oKJdvFj9OkZGSD3H9NNX8Rwd_w",
            authDomain: "todolistsyn.firebaseapp.com",
            projectId: "todolistsyn",
            storageBucket: "todolistsyn.firebasestorage.app",
            messagingSenderId: "130795159103",
            appId: "1:130795159103:web:55c7b433cba91d47db828a",
            measurementId: "G-C0BJ8RR18F"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        window.db = getFirestore(app);
        
        // 외부 스크립트에서 접근할 수 있도록 Firebase 함수들을 window에 할당
        window.firebaseDoc = doc;
        window.firebaseSetDoc = setDoc;
        window.firebaseOnSnapshot = onSnapshot;

        console.log("Firebase initialized");
        
        // 동기화 리스너 실행
        if (typeof initFirebaseSync === 'function') {
            initFirebaseSync();
        }
    </script>

    <script>
        // 초기 데이터는 비워두고, 일렉트론에서 데이터를 받아오면 채웁니다.
        window.isSyncing = false; // 동기화 플래그 초기화
        window.lastCloudTimestamp = 0; // 클라우드 데이터 시간 기록

        let tasks = [
            // 로딩 전 보여줄 기본 문구 (잠시 후 파일 내용으로 교체됨)
            { id: 0, text: "데이터를 불러오는 중입니다...", completed: false, createdAt: "" }
        ];

        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');
        const taskDateInput = document.getElementById('taskDate');

        // 오늘 날짜를 기본값으로 설정 (YYYY-MM-DD 형식)
        const todayStr = new Date().toISOString().split('T')[0];
        taskDateInput.value = todayStr;

        const taskCount = document.getElementById('taskCount');

        // [추가] 현재 편집 중인 메모의 Task ID를 저장할 변수
        let currentMemoTaskId = null; 
        const memoModal = document.getElementById('memoModal');

        // [추가] 모달 사용성 개선: 바깥쪽 클릭 시 닫기 및 ESC 키 지원
        memoModal.addEventListener('click', (e) => {
            if (e.target === memoModal) closeMemoModal();
        });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !memoModal.classList.contains('hidden')) {
                closeMemoModal();
            }
        });

        // [일렉트론 연동] 데이터가 변경될 때마다 PC 파일로 저장 요청
        async function saveTasks() {
            if (window.isSyncing) return; // Firebase에서 동기화 중일 때는 저장을 건너뜁니다.

            const titleEl = document.getElementById('headerTitle');
            const subtitleEl = document.getElementById('headerSubtitle');
            
            const dataToSave = {
                title: titleEl ? titleEl.innerText.trim() : "순하게 호흡",
                subtitle: subtitleEl ? subtitleEl.innerText.trim() : "작은것 부터 천천히.",
                tasks: tasks,
                lastUpdated: Date.now()
            };

            // 1. 일렉트론 로컬 저장
            if (window.electronAPI) {
                window.electronAPI.saveData(dataToSave);
            } else {
                // 스마트폰(PWA) 브라우저 로컬 저장
                localStorage.setItem('dayd_backup', JSON.stringify(dataToSave));
            }

            // 2. Firebase 클라우드 저장
            if (window.db && window.firebaseSetDoc) {
                try {
                    const docRef = window.firebaseDoc(window.db, "todo_data", "user_default");
                    await window.firebaseSetDoc(docRef, dataToSave);
                    window.lastCloudTimestamp = dataToSave.lastUpdated; // 내 저장 시간 업데이트
                    console.log("Cloud Save Success:", window.lastCloudTimestamp);
                } catch (e) {
                    console.error("Firebase 저장 실패:", e);
                }
            }
        }
        // saveTasks가 전역 범위에 있어야 contenteditable의 onblur에서 호출 가능합니다.
        window.saveTasks = saveTasks;

        // [추가] 서비스 워커 등록 (PWA 활성화) - file:// 프로토콜이 아닐 때만 실행
        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('서비스 워커 등록 성공:', reg.scope))
                    .catch(err => console.log('서비스 워커 등록 실패:', err));
            });
        }

        // 엔터키 입력 처리
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        // [추가] 메모 팝업 위치를 마우스 포인터로 이동시키는 함수
        function moveMemo(e, id) {
            const memo = document.getElementById(`memo-tooltip-${id}`);
            if (memo) {
                memo.style.left = e.clientX + 'px';
                memo.style.top = e.clientY + 'px';
            }
        }

        // 화면 그리기 함수
        function renderTasks() {
            taskList.innerHTML = '';
            let activeCount = 0;

            // 1. 모든 할 일을 targetDate 기준으로 그룹화합니다.
            const groupedTasks = tasks.reduce((acc, task) => {
                // 날짜가 없는 경우(이전 데이터) 생성일에서 날짜 추출 시도
                let dateKey = task.targetDate || (task.createdAt ? task.createdAt.split('.').slice(0, 3).map(s => s.trim().padStart(2, '0')).join('-') : '날짜 미지정');
                
                (acc[dateKey] = acc[dateKey] || []).push(task);
                return acc;
            }, {});

            // 2. 날짜 키를 최신순으로 정렬합니다. (미래 -> 오늘 -> 과거)
            const sortedDates = Object.keys(groupedTasks).sort((a, b) => {
                return new Date(b) - new Date(a);
            });

            // 3. 정렬된 날짜 그룹별로 화면에 렌더링합니다.
            sortedDates.forEach(dateKey => {
                let taskNumber = 0; // 날짜별로 순번 초기화

                // 날짜 헤더 생성
                const dateHeader = document.createElement('div');
                dateHeader.className = 'pt-3 pb-1'; // 날짜 그룹간의 간격

                let displayDate = '';
                let fullDate = dateKey;

                if (dateKey !== '날짜 미지정' && dateKey.includes('-')) {
                    const [y, m, d] = dateKey.split('-').map(Number);
                    const groupDate = new Date(y, m - 1, d);

                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    
                    const yesterday = new Date();
                    yesterday.setDate(today.getDate() - 1);
                    yesterday.setHours(0, 0, 0, 0);

                    const tomorrow = new Date();
                    tomorrow.setDate(today.getDate() + 1);
                    tomorrow.setHours(0, 0, 0, 0);

                    if (groupDate.getTime() === today.getTime()) {
                        displayDate = '오늘';
                    } else if (groupDate.getTime() === yesterday.getTime()) {
                        displayDate = '어제';
                    } else if (groupDate.getTime() === tomorrow.getTime()) {
                        displayDate = '내일';
                    }
                    fullDate = groupDate.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
                }

                dateHeader.innerHTML = `
                    <div class="flex items-baseline border-b border-slate-100 pb-2 mb-1">
                        <span class="font-bold text-sm text-slate-800 uppercase tracking-wider">${displayDate || fullDate}</span>
                        ${displayDate ? `<span class="text-[10px] text-slate-400 ml-2 font-normal">${fullDate}</span>` : ''}
                    </div>
                `;
                taskList.appendChild(dateHeader);

                // 해당 날짜의 할 일 목록 렌더링
                const tasksForDate = groupedTasks[dateKey];
                tasksForDate.forEach(task => {
                    taskNumber++; // 각 할 일에 대해 순번 증가
                    
                    // 하위 호환성: 기존의 completed(boolean)를 status(string)로 변환
                    if (task.status === undefined) {
                        task.status = task.completed ? 'done' : 'todo';
                    }

                    if (task.status !== 'done') activeCount++;

                    // 상태에 따른 스타일 정의
                    const statusStyles = {
                        'todo': { li: 'bg-white border-slate-200 shadow-sm hover:shadow-md', text: 'text-stone-800 font-semibold', icon: 'fa-regular fa-circle text-indigo-500' },
                        'half': { li: 'bg-yellow-50/50 border-yellow-100 shadow-sm', text: 'text-yellow-300 font-light', icon: 'fa-brands fa-envira text-yellow-300' },
                        'done': { li: 'bg-slate-50 border-slate-100 opacity-70', text: 'text-stone-400 line-through', icon: 'fa-solid fa-circle-check text-indigo-500' },
                        'failed': { li: 'bg-rose-50 border-rose-100 opacity-70', text: 'text-rose-400 line-through', icon: 'fa-solid fa-circle-xmark text-rose-400' }
                    };
                    const currentStyle = statusStyles[task.status] || statusStyles['todo'];

                    const li = document.createElement('li');
                    // [변경] 메모 영역을 아래에 배치하기 위해 flex-col로 구조 변경
                    li.className = `relative group flex flex-col p-2 rounded-lg border transition-all duration-200 ${currentStyle.li}`;
                    li.setAttribute('onmousemove', `moveMemo(event, ${task.id})`);

                    const topRow = document.createElement('div');
                    topRow.className = "flex items-center justify-between w-full";

                    // 수정 모드일 때와 아닐 때 보여지는 화면을 다르게 합니다.
                    if (task.isEditing) {
                        topRow.innerHTML = `
                            <div class="flex items-center gap-2 flex-1 w-full p-1">
                                <input type="date" id="editDate-${task.id}" value="${task.targetDate || ''}" 
                                    class="bg-white border border-indigo-200 rounded-lg px-2 py-1.5 text-[11px] font-medium text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 shadow-sm cursor-pointer w-[115px]">
                                <input type="text" id="editInput-${task.id}" value="${task.text}" spellcheck="false"
                                    class="flex-1 bg-white border border-indigo-300 rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-stone-700"
                                    onkeypress="if(event.key === 'Enter') saveEdit(${task.id})">
                                <div class="flex gap-0.5">
                                <button onclick="saveEdit(${task.id})" class="text-indigo-600 hover:text-indigo-800 p-2 transition-colors" title="저장">
                                    <i class="fa-solid fa-check"></i>
                                </button>
                                <button onclick="cancelEdit(${task.id})" class="text-stone-400 hover:text-rose-500 p-2 transition-colors" title="취소">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                            </div>
                        `;
                    } else {
                        topRow.innerHTML = `
                            <div class="flex items-center gap-2 flex-1 cursor-pointer" onclick="toggleTask(${task.id})">
                                <span class="text-sm font-medium text-stone-400 w-8 text-center">${taskNumber}.</span>
                                <button class="text-xl transition-colors">
                                    <i class="${currentStyle.icon}"></i>
                                </button>
                                <div class="flex-1 flex flex-col">
                                    <span class="${currentStyle.text} transition-all">
                                        ${task.text}
                                    </span>
                                    <span class="text-[11px] ${task.status === 'done' || task.status === 'failed' ? 'text-stone-300' : 'text-stone-400'} mt-0.5">
                                        ${task.createdAt || '이전 기록'}
                                    </span>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <!-- 메모 버튼 및 호버 툴팁 -->
                                <div class="relative flex items-center justify-center" title="메모 확인">
                                    <button onclick="openMemoModal(${task.id})" class="${task.memo ? 'text-indigo-500' : 'text-stone-300'} hover:text-indigo-600 p-2 transition-colors">
                                        <i class="fa-solid fa-note-sticky"></i>
                                    </button>
                                    ${task.memo ? `<div id="memo-tooltip-${task.id}" class="fixed hidden group-hover:block z-50 w-max min-w-[120px] max-w-[280px] p-2.5 bg-stone-800/90 backdrop-blur-sm text-white text-[12px] leading-relaxed rounded-xl shadow-xl pointer-events-none whitespace-pre-wrap break-words border border-white/10 text-left -translate-x-1/2 -translate-y-[calc(100%+15px)]">${task.memo}<div class="absolute top-full left-1/2 -translate-x-1/2 border-[6px] border-transparent border-t-stone-800/90"></div></div>` : ''}
                                </div>
                                <button onclick="startEdit(${task.id})" class="text-stone-400 hover:text-indigo-500 p-2 transition-colors" title="수정">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <button onclick="deleteTask(${task.id})" class="text-stone-400 hover:text-rose-500 p-2 transition-colors" title="삭제">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        `;
                    }
                    li.appendChild(topRow);

                    taskList.appendChild(li);
                });
            });

            taskCount.textContent = `남은 일: ${activeCount}개`;
        }

        // 추가 기능
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;
            
            // 날짜를 선택하지 않았다면 오늘 날짜를 기본값으로 사용
            const targetDate = taskDateInput.value || new Date().toISOString().split('T')[0];

            // 현재 날짜와 시간 구하기 (예: 2026. 3. 17. 오후 6:30)
            const now = new Date();
            const dateOptions = { year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            const createdAt = now.toLocaleDateString('ko-KR', dateOptions);

            tasks.unshift({
                id: Date.now(),
                text: text,
                status: 'todo', // [변경] boolean 대신 string 상태값 사용
                createdAt: createdAt, 
                targetDate: targetDate, // [추가] 목표 날짜
                memo: ""
            });
            taskInput.value = '';
            renderTasks();
            saveTasks(); // 상태 변경 후 저장 호출
        }

        // [추가] 퀵 날짜 선택 기능
        function setQuickDate(type) {
            const dateInput = document.getElementById('taskDate');
            const today = new Date();
            
            if (type === 'today') {
                dateInput.value = today.toISOString().split('T')[0];
            } else if (type === 'tomorrow') {
                const tomorrow = new Date(today);
                tomorrow.setDate(today.getDate() + 1);
                dateInput.value = tomorrow.toISOString().split('T')[0];
            }
            taskInput.focus(); // 날짜 선택 후 바로 입력창으로 포커스 이동
        }

        // 상태 순환 토글 기능 (대기 -> 진행 -> 완료 -> 실패 -> 대기)
        function toggleTask(id) {
            const statusOrder = ['todo', 'done', 'half', 'failed'];
            tasks = tasks.map(task => {
                if (task.id === id) {
                    // 현재 상태가 없으면 todo로 시작
                    const currentStatus = task.status || (task.completed ? 'done' : 'todo');
                    const currentIndex = statusOrder.indexOf(currentStatus);
                    const nextIndex = (currentIndex + 1) % statusOrder.length;
                    return { ...task, status: statusOrder[nextIndex], completed: statusOrder[nextIndex] === 'done' };
                }
                return task;
            });
            renderTasks();
            saveTasks(); // 상태 변경 후 저장 호출
        }

        // 수정 시작 기능 (연필 버튼 클릭 시)
        function startEdit(id) {
            tasks = tasks.map(task => 
                task.id === id ? { ...task, isEditing: true } : task
            );
            renderTasks();
            
            // 입력창에 자동으로 포커스를 주고 커서를 맨 뒤로 이동시킵니다
            setTimeout(() => {
                const input = document.getElementById(`editInput-${id}`);
                if(input) {
                    input.focus();
                    input.setSelectionRange(input.value.length, input.value.length);
                }
            }, 10);
        }

        // 수정 완료 기능 (체크 버튼 또는 엔터키 입력 시)
        function saveEdit(id) {
            const input = document.getElementById(`editInput-${id}`);
            const dateInput = document.getElementById(`editDate-${id}`);
            const newText = input.value.trim();
            const newDate = dateInput.value;
            
            if (newText === '') {
                cancelEdit(id); // 빈 칸으로 저장하려 하면 수정을 취소합니다
                return;
            }
            
            tasks = tasks.map(task => 
                task.id === id ? { ...task, text: newText, targetDate: newDate, isEditing: false } : task
            );
            renderTasks();
            saveTasks(); // 상태 변경 후 저장 호출
        }

        // 수정 취소 기능 (엑스 버튼 클릭 시)
        function cancelEdit(id) {
            tasks = tasks.map(task => 
                task.id === id ? { ...task, isEditing: false } : task
            );
            renderTasks();
        }

        // 삭제 기능
        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            renderTasks();
            saveTasks(); // 상태 변경 후 저장 호출
        }

        // 완료된 항목 일괄 삭제 기능
        function clearCompleted() {
            tasks = tasks.filter(task => task.status !== 'done');
            renderTasks();
            saveTasks(); // 상태 변경 후 저장 호출
        }

        // [변경] 메모 모달 열기
        function openMemoModal(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            currentMemoTaskId = id;
            const memoInput = document.getElementById('modalMemoInput');
            const deleteBtn = document.getElementById('btnDeleteMemo');
            
            memoInput.value = task.memo || "";
            
            // 메모가 있을 때만 삭제 버튼 표시
            if (task.memo) {
                deleteBtn.classList.remove('hidden');
            } else {
                deleteBtn.classList.add('hidden');
            }

            memoModal.classList.remove('hidden');
            memoInput.focus();
        }

        // [변경] 메모 모달 닫기
        function closeMemoModal() {
            memoModal.classList.add('hidden');
            currentMemoTaskId = null;
        }

        // [변경] 메모 저장 (모달에서)
        function saveCurrentMemo() {
            if (!currentMemoTaskId) return;
            const val = document.getElementById('modalMemoInput').value;
            
            tasks = tasks.map(task => task.id === currentMemoTaskId ? { ...task, memo: val } : task);
            renderTasks();
            saveTasks(); // 한 번만 호출
            closeMemoModal();
        }

        // [변경] 메모 삭제 (모달에서)
        function deleteCurrentMemo() {
            document.getElementById('modalMemoInput').value = ''; // 내용을 비우고
            saveCurrentMemo(); // 저장하면 삭제와 동일한 효과
        }

        // [추가] 데이터 내보내기 (백업)
        async function exportData() {
            const result = await window.electronAPI.backupData();
            if (result.success) {
                alert(`백업 파일이 저장되었습니다!\n경로: ${result.path}`);
            } else if (result.message) {
                alert(`백업 실패: ${result.message}`);
            }
        }

        // [추가] 데이터 불러오기 (복원)
        async function importData() {
            if (confirm('불러올 data.json 파일을 선택해주세요. 불렁온 후 파일은 \n\n 내부 저장소(c:\Users\(사용자이름)\AppData\Roaming\today-flow-todo\)로 복사됩니다.\n\n(불러온 파일은 더이상 사용되지 않습니다.\n\n※ 주의: 현재 앱에 저장된 데이터는 사라지고 백업 파일의 내용으로 교체됩니다.')) {
                const result = await window.electronAPI.restoreData();
                if (result.success) {
                    alert('데이터를 성공적으로 가져왔습니다.\n이제 앱 내부 저장소에서 안전하게 관리됩니다.');
                    location.reload(); // 데이터를 새로 읽어오기 위해 화면 새로고침
                } else if (result.message) {
                    alert(`복원 실패: ${result.message}`);
                }
            }
        }

        // [추가] Firebase 실시간 동기화 리스너
        function initFirebaseSync() {
            if (!window.db || !window.firebaseOnSnapshot) return;
            
            console.log("Starting Firebase Sync Listener...");
            window.firebaseOnSnapshot(window.firebaseDoc(window.db, "todo_data", "user_default"), (snap) => {
                if (!snap.exists()) {
                    console.log("No cloud data found.");
                    return;
                }

                const data = snap.data();
                const cloudTimestamp = data.lastUpdated || 0;

                // 1. 내가 방금 저장한 데이터가 아니고 (isSyncing)
                // 2. 클라우드의 타임스탬프가 로컬과 다를 때만 업데이트
                if (cloudTimestamp !== window.lastCloudTimestamp && !window.isSyncing) {
                    console.log("New data detected from cloud. Syncing...");
                    window.isSyncing = true;
                    
                    window.lastCloudTimestamp = cloudTimestamp;
                    tasks = data.tasks || [];
                    
                    if (data.title !== undefined) {
                        document.getElementById('headerTitle').innerText = data.title;
                    }
                    if (data.subtitle !== undefined) {
                        document.getElementById('headerSubtitle').innerText = data.subtitle;
                    }
                    
                    if (window.electronAPI) {
                        window.electronAPI.saveData(data);
                    } else {
                        localStorage.setItem('dayd_backup', JSON.stringify(data));
                    }
                    
                    renderTasks();
                    window.isSyncing = false; // 플래그 해제
                }
            });
        }

        // 초기 화면 그리기
        // [추가] 서비스 워커 등록 (PWA 활성화) - 웹 환경(http/https)에서만 실행
        if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA 서비스 워커 활성화 완료:', reg.scope))
                    .catch(err => console.log('서비스 워커 등록 실패:', err));
            });
        }

        // 앱이 시작되면 일렉트론에게 저장된 데이터를 달라고 요청합니다.
        (async () => {
            if (window.electronAPI) {
                const loadedData = await window.electronAPI.loadData();
                if (loadedData && typeof loadedData === 'object' && !Array.isArray(loadedData)) {
                    // 새로운 객체 형식인 경우 (제목, 부제목 포함)
                    tasks = loadedData.tasks || [];
                    // 로컬 파일의 마지막 수정 시간을 동기화 기준점에 기록합니다.
                    window.lastCloudTimestamp = loadedData.lastUpdated || 0;
                    document.getElementById('headerTitle').innerText = loadedData.title || "순하게 호흡";
                    document.getElementById('headerSubtitle').innerText = loadedData.subtitle || "작은것 부터 천천히. 큰것은 작은것 부터 시작된다.";
                } else if (Array.isArray(loadedData)) {
                    // 이전 버전(배열 형태) 데이터와 호환성 유지
                    tasks = loadedData;
                } else {
                    // 저장된 파일이 없으면 초기값 설정
                    tasks = [
                        { id: 1, text: "아침 기상 후 따뜻한 물 한 잔 마시기 (위장 달래기)", completed: false, createdAt: new Date().toLocaleDateString('ko-KR') },
                        { id: 2, text: "오늘 할 일을 여기에 적어보세요", completed: false, createdAt: new Date().toLocaleDateString('ko-KR') }
                    ];
                }
                renderTasks();
            } else {
                console.log("일렉트론 환경이 아닙니다.");
                // 브라우저 로컬 데이터 먼저 확인
                const localData = localStorage.getItem('dayd_backup');
                if (localData) {
                    const parsed = JSON.parse(localData);
                    tasks = parsed.tasks || [];
                    window.lastCloudTimestamp = parsed.lastUpdated || 0;
                }
                renderTasks();
            }
        })();
    </script>
</body>
